{% extends "base.html" %}
{% block title %}Login - LE TOUR{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 p-lg bg-surface-container rounded-xl border border-outline-variant">
    <div class="flex items-center justify-center gap-sm mb-md">
        <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">leaderboard</span>
        <h1 class="font-display-lg text-display-lg-mobile uppercase tracking-tighter text-primary">LE TOUR</h1>
    </div>
    <p class="text-center font-label-caps text-on-surface-variant mb-lg">Log in to manage your team</p>
    <form method="post" action="/login" class="space-y-md">
        <input type="email" name="email" placeholder="EMAIL" class="w-full p-3 bg-surface-container-high border border-outline-variant rounded font-body-md text-on-surface placeholder:text-on-surface-variant focus:border-primary-container focus:ring-0" required autofocus>
        <input type="password" name="password" placeholder="PASSWORD" class="w-full p-3 bg-surface-container-high border border-outline-variant rounded font-body-md text-on-surface placeholder:text-on-surface-variant focus:border-primary-container focus:ring-0" required>
        <button type="submit" class="w-full bg-primary-container text-on-primary-container py-3 rounded font-label-caps text-label-caps hover:opacity-90 transition-opacity">LOG IN</button>
    </form>
</div>
{% endblock %}
